apiVersion: apps/v1
kind: Deployment
metadata:
  name: byparr
  namespace: byparr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: byparr
  template:
    metadata:
      labels:
        app: byparr
    spec:
      containers:
        - name: byparr
          image: ghcr.io/thephaseless/byparr:latest
          ports:
            - containerPort: 8191
              name: http
          env:
            - name: PORT
              value: "8191"
          livenessProbe:
            httpGet:
              path: /health
              port: 8191
            initialDelaySeconds: 120
            periodSeconds: 120
            failureThreshold: 3
            timeoutSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8191
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: byparr
  namespace: byparr
spec:
  ports:
    - name: http
      port: 8191
      protocol: TCP
      targetPort: 8191
  selector:
    app: byparr
  type: ClusterIP
