apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: seerr
  namespace: overseerr
spec:
  interval: 24h
  url: oci://ghcr.io/seerr-team/seerr/seerr-chart
  ref:
    semver: ">=3.0.0"

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: overseerr
spec:
  interval: 1h

  chartRef:
    kind: OCIRepository
    name: seerr

  values:
    image:
      repository: ghcr.io/seerr-team/seerr
      tag: v3.2.0

    env:
      TZ: "America/New_York"

    persistence:
      config:
        enabled: true
        existingClaim: overseerr-config
        mountPath: /app/config

    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: ${ddns_target}
      hosts:
        - host: overseerr.${base_domain}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - overseerr.${base_domain}
          secretName: overseerr-tls
